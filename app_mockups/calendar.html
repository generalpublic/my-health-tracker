<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; frame-ancestors 'none'; form-action 'self';">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#8B5CF6">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Health Tracker — Calendar</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="css/calendar.css">
</head>
<body>
  <div class="phone-frame">
    <div class="screen">

      <div class="status-bar">
        <span>9:41</span>
        <span></span>
        <span>100%</span>
      </div>

      <div class="screen-content">

        <!-- Fixed header: title + metric pills -->
        <div class="cal-fixed-header">
          <div class="cal-top-bar">
            <div class="cal-back">&#8249;</div>
            <div class="cal-page-title">Calendar</div>
          </div>
          <div class="cal-metric-row">
            <div class="pill-row" id="calMetricPills"></div>
          </div>
        </div>

        <!-- Fade gradient -->
        <div class="cal-fade"></div>

        <!-- Scrollable calendar -->
        <div class="cal-scroll" id="calScroll">
          <div id="calMonths"></div>
        </div>

      </div>

    </div>
  </div>

  <!-- Day detail bottom sheet -->
  <div class="cal-detail-overlay" id="detailOverlay">
    <div class="cal-detail-sheet">
      <div class="cal-detail-handle"></div>
      <div class="cal-detail-date" id="detailDate"></div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="crypto-store.js"></script>
  <script src="data-loader.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/calendar.js"></script>
<script src="js/sw-register.js"></script>
</body>
</html>
