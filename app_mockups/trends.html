<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; frame-ancestors 'none'; form-action 'self';">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#8B5CF6">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Health Tracker — Trends</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="css/trends.css">
</head>
<body>
  <div class="phone-frame">
    <div class="screen">

      <div class="status-bar">
        <span>9:41</span>
        <span></span>
        <span>100%</span>
      </div>

      <div class="screen-content">

        <div class="trends-header">
          <div class="trends-title">Trends</div>

          <!-- Date Navigation -->
          <div class="date-nav animate-in">
            <div class="date-nav-arrow" id="datePrev">&#8249;</div>
            <div>
              <div class="date-nav-label" id="dateLabel">Today</div>
              <div class="date-nav-today" id="dateTodayLink" style="display:none">Back to Today</div>
            </div>
            <div class="date-nav-arrow" id="dateNext">&#8250;</div>
          </div>

          <!-- Metric picker pills -->
          <div class="pill-row" id="metricPills"></div>

          <!-- Time range pills -->
          <div class="pill-row range-pills-row" id="rangePills">
            <div class="pill" data-range="7">7D</div>
            <div class="pill pill-active" data-range="14">14D</div>
            <div class="pill" data-range="30">30D</div>
          </div>
        </div>

        <!-- Chart -->
        <div class="card animate-in">
          <div class="chart-container">
            <svg class="chart-svg" id="trendChart" viewBox="0 0 340 180" preserveAspectRatio="none"></svg>
            <div class="chart-x-labels" id="chartXLabels"></div>
          </div>

          <div class="divider"></div>

          <!-- Stats row -->
          <div class="stats-row" id="statsRow">
            <div class="stat-item">
              <div class="stat-value" id="statAvg">--</div>
              <div class="stat-label">Average</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statBest">--</div>
              <div class="stat-label">Best</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statWorst">--</div>
              <div class="stat-label">Worst</div>
            </div>
            <div class="stat-item">
              <div class="stat-trend" id="statTrend">--</div>
              <div class="stat-label">Trend</div>
            </div>
          </div>
        </div>

        <!-- Calendar Month View -->
        <div class="card animate-in trends-calendar-card">
          <div class="card-header">
            <div class="card-title">Calendar View <span id="heatmapMetricLabel" class="heatmap-metric-label">— Readiness</span></div>
          </div>
          <div class="cal-month-nav">
            <div class="cal-month-nav-arrow" id="calMonthPrev">&#8249;</div>
            <div class="cal-month-nav-label" id="calMonthLabel">March 2026</div>
            <div class="cal-month-nav-arrow" id="calMonthNext">&#8250;</div>
          </div>
          <div class="trends-cal-weekday-row" id="calWeekdayRow"></div>
          <div class="trends-cal-grid" id="calGrid"></div>
        </div>

      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab-item tab-item-inactive" data-page="today.html">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3,10 L12,3 L21,10 L21,20 C21,20.55 20.55,21 20,21 L15,21 L15,15 L9,15 L9,21 L4,21 C3.45,21 3,20.55 3,20 Z"/></svg></div>
          <div class="tab-label">Today</div>
        </div>
        <div class="tab-item tab-item-active">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="1" y="17" width="4" height="5" rx="0.5"/><rect x="7" y="13" width="4" height="9" rx="0.5"/><rect x="13" y="9" width="4" height="13" rx="0.5"/><rect x="19" y="4" width="4" height="18" rx="0.5"/><path d="M3,14 L9,10 L15,6 L21,2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17,2 21,2 21,6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="tab-label">Trends</div>
        </div>
        <div class="tab-item tab-center" data-page="log-entry.html">
          <div class="tab-center-button">+</div>
        </div>
        <div class="tab-item tab-item-inactive" data-page="activity.html">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,12 6,12 9,3 12,21 15,7 18,12 22,12"/></svg></div>
          <div class="tab-label">Activity</div>
        </div>
        <div class="tab-item tab-item-inactive" data-page="profile.html">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5,20 C5,16.134 8.134,13 12,13 C15.866,13 19,16.134 19,20"/></svg></div>
          <div class="tab-label">Profile</div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="crypto-store.js"></script>
  <script src="data-loader.js"></script>
  <script src="js/trends.js"></script>
<script src="js/sw-register.js"></script>
</body>
</html>
