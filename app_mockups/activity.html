<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; frame-ancestors 'none'; form-action 'self';">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#8B5CF6">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Health Tracker — Activity</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="css/activity.css">
</head>
<body>
  <div class="phone-frame">
    <div class="screen">

      <div class="status-bar">
        <span>9:41</span>
        <span></span>
        <span>100%</span>
      </div>

      <div class="screen-content">

        <div class="page-title">Activity</div>

        <!-- Segment control -->
        <div class="segment-wrapper">
          <div class="segment-control">
            <div class="segment-item segment-item-active" id="segSessions" data-view="sessions">Sessions</div>
            <div class="segment-item" id="segStrength" data-view="strength">Strength</div>
          </div>
        </div>

        <!-- ========== SESSIONS VIEW ========== -->
        <div id="sessionsView">

          <!-- Today's session -->
          <div class="card session-card animate-in" id="todaySession"></div>

          <!-- This week -->
          <div class="card animate-in week-card">
            <div class="card-title week-card-title">This Week</div>
            <div id="weekSessions"></div>
          </div>
        </div>

        <!-- ========== STRENGTH VIEW ========== -->
        <div id="strengthView" style="display:none">

          <div class="card animate-in">
            <div class="card-header">
              <div class="card-title">Today's Exercises</div>
              <span class="badge" id="setCount"></span>
            </div>
            <div id="strengthList"></div>
          </div>

          <!-- Add exercise -->
          <div class="card animate-in add-exercise-card">
            <button class="btn-secondary" id="addBtn">+ Add Exercise</button>

            <div class="add-form" id="addForm">
              <div class="form-row">
                <div class="form-label">Muscle Group</div>
                <div class="pill-row" id="muscleGroupPills">
                  <div class="pill pill-active">Chest</div>
                  <div class="pill">Back</div>
                  <div class="pill">Shoulders</div>
                  <div class="pill">Arms</div>
                  <div class="pill">Legs</div>
                  <div class="pill">Core</div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-label">Exercise</div>
                <input class="text-input" id="exerciseInput" placeholder="Exercise name..." value="">
              </div>

              <div class="form-row">
                <div class="number-row number-row-centered">
                  <div class="number-group">
                    <div class="number-label">Weight (lbs)</div>
                    <div class="stepper">
                      <button class="stepper-btn" data-target="weightVal" data-step="-5">-</button>
                      <div class="stepper-value" id="weightVal">135</div>
                      <button class="stepper-btn" data-target="weightVal" data-step="5">+</button>
                    </div>
                  </div>
                  <div class="number-group">
                    <div class="number-label">Reps</div>
                    <div class="stepper">
                      <button class="stepper-btn" data-target="repsVal" data-step="-1">-</button>
                      <div class="stepper-value" id="repsVal">10</div>
                      <button class="stepper-btn" data-target="repsVal" data-step="1">+</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-label rpe-label-row">RPE (1-10) <span id="rpeDisplay" class="rpe-display">7</span></div>
                <input type="range" min="1" max="10" value="7" id="rpeSlider">
              </div>

              <div class="form-actions">
                <button class="btn-secondary" id="addSetBtn">Add Set</button>
                <button class="btn-primary" id="doneBtn">Done</button>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab-item tab-item-inactive" data-page="today.html">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3,10 L12,3 L21,10 L21,20 C21,20.55 20.55,21 20,21 L15,21 L15,15 L9,15 L9,21 L4,21 C3.45,21 3,20.55 3,20 Z"/></svg></div>
          <div class="tab-label">Today</div>
        </div>
        <div class="tab-item tab-item-inactive" data-page="trends.html">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="1" y="17" width="4" height="5" rx="0.5"/><rect x="7" y="13" width="4" height="9" rx="0.5"/><rect x="13" y="9" width="4" height="13" rx="0.5"/><rect x="19" y="4" width="4" height="18" rx="0.5"/><path d="M3,14 L9,10 L15,6 L21,2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17,2 21,2 21,6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="tab-label">Trends</div>
        </div>
        <div class="tab-item tab-center" data-page="log-entry.html">
          <div class="tab-center-button">+</div>
        </div>
        <div class="tab-item tab-item-active">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,12 6,12 9,3 12,21 15,7 18,12 22,12"/></svg></div>
          <div class="tab-label">Activity</div>
        </div>
        <div class="tab-item tab-item-inactive" data-page="profile.html">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5,20 C5,16.134 8.134,13 12,13 C15.866,13 19,16.134 19,20"/></svg></div>
          <div class="tab-label">Profile</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Session detail bottom sheet -->
  <div class="session-detail-overlay" id="sessionDetailOverlay">
    <div class="session-detail-sheet" id="sessionDetailSheet">
      <div class="session-detail-drag-handle" id="sessionDetailDragHandle"></div>
      <div id="sessionDetailContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="crypto-store.js"></script>
  <script src="data-loader.js"></script>
  <script src="js/activity.js"></script>
<script src="js/sw-register.js"></script>
</body>
</html>
