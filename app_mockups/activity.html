<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; frame-ancestors 'none'; form-action 'self';">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#8B5CF6">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Health Tracker — Activity</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    .page-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      padding: var(--space-sm) var(--space-xl) var(--space-md);
    }

    /* Session card */
    .session-card {
      padding: var(--space-xl);
    }

    .session-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-md);
    }

    .session-info {
      display: flex;
      gap: var(--space-md);
    }

    .session-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--primary-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .session-name {
      font-size: var(--text-lg);
      font-weight: 700;
    }

    .session-meta {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .session-cals {
      text-align: right;
    }

    .session-cal-num {
      font-size: var(--text-2xl);
      font-weight: 800;
      color: var(--primary);
    }

    .session-cal-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    /* Stats grid */
    .session-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      margin: var(--space-lg) 0;
    }

    .session-stat {
      text-align: center;
      padding: var(--space-md);
      background: var(--bg);
      border-radius: var(--radius-md);
    }

    .session-stat-value {
      font-size: var(--text-lg);
      font-weight: 700;
    }

    .session-stat-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* TE gauges */
    .te-row {
      display: flex;
      justify-content: space-around;
      margin: var(--space-lg) 0;
    }

    .te-item {
      text-align: center;
    }

    /* TE gauge uses .gauge .gauge-sm from design-system.css */
    .te-gauge {
      width: 70px;
      height: 70px;
    }

    .te-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Zone bar */
    .zone-section {
      margin-top: var(--space-md);
    }

    .zone-bar-lg {
      display: flex;
      height: 14px;
      border-radius: var(--radius-full);
      overflow: hidden;
      gap: 1px;
    }

    .zone-bar-lg > div {
      height: 100%;
    }

    .zone-legend {
      display: flex;
      justify-content: space-between;
      margin-top: var(--space-sm);
    }

    .zone-legend-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 10px;
      color: var(--text-secondary);
    }

    .zone-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      margin-bottom: 2px;
    }

    /* Manual entry section */
    .manual-section {
      margin-top: var(--space-lg);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border-subtle);
    }

    .manual-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }

    .manual-label {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .manual-pill {
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 600;
      background: var(--primary-bg);
      color: var(--primary);
    }

    /* Week history */
    .week-session {
      display: flex;
      align-items: center;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border-subtle);
      gap: var(--space-md);
    }

    .week-session:last-child {
      border-bottom: none;
    }

    .week-date {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      min-width: 72px;
    }

    .week-name {
      flex: 1;
      font-size: var(--text-base);
      font-weight: 500;
    }

    .week-dur {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .week-cal {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--primary);
      min-width: 50px;
      text-align: right;
    }

    /* Strength view */
    .strength-exercise {
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .strength-exercise:last-child {
      border-bottom: none;
    }

    .strength-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-xs);
    }

    .strength-name {
      font-size: var(--text-base);
      font-weight: 600;
    }

    .muscle-tag {
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      background: var(--primary-bg);
      color: var(--primary);
    }

    .strength-sets {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    /* Add exercise form */
    .add-form {
      display: none;
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border);
    }

    .add-form.visible {
      display: block;
    }

    .form-row {
      margin-bottom: var(--space-lg);
    }

    .form-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
    }

    .number-row {
      display: flex;
      gap: var(--space-lg);
    }

    .number-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
    }

    .number-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="screen">

      <div class="status-bar">
        <span>9:41</span>
        <span></span>
        <span>100%</span>
      </div>

      <div class="screen-content">

        <div class="page-title">Activity</div>

        <!-- Segment control -->
        <div style="padding:0 var(--space-xl) var(--space-md)">
          <div class="segment-control">
            <div class="segment-item segment-item-active" id="segSessions" onclick="showView('sessions')">Sessions</div>
            <div class="segment-item" id="segStrength" onclick="showView('strength')">Strength</div>
          </div>
        </div>

        <!-- ========== SESSIONS VIEW ========== -->
        <div id="sessionsView">

          <!-- Today's session -->
          <div class="card session-card animate-in" id="todaySession"></div>

          <!-- This week -->
          <div class="card animate-in" style="margin-top:var(--space-md)">
            <div class="card-title" style="margin-bottom:var(--space-md)">This Week</div>
            <div id="weekSessions"></div>
          </div>
        </div>

        <!-- ========== STRENGTH VIEW ========== -->
        <div id="strengthView" style="display:none">

          <div class="card animate-in">
            <div class="card-header">
              <div class="card-title">Today's Exercises</div>
              <span class="badge" id="setCount"></span>
            </div>
            <div id="strengthList"></div>
          </div>

          <!-- Add exercise -->
          <div class="card animate-in" style="margin-top:var(--space-md)">
            <button class="btn-secondary" onclick="toggleAddForm()" id="addBtn">+ Add Exercise</button>

            <div class="add-form" id="addForm">
              <div class="form-row">
                <div class="form-label">Muscle Group</div>
                <div class="pill-row" id="muscleGroupPills">
                  <div class="pill pill-active" onclick="selectPill(this)">Chest</div>
                  <div class="pill" onclick="selectPill(this)">Back</div>
                  <div class="pill" onclick="selectPill(this)">Shoulders</div>
                  <div class="pill" onclick="selectPill(this)">Arms</div>
                  <div class="pill" onclick="selectPill(this)">Legs</div>
                  <div class="pill" onclick="selectPill(this)">Core</div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-label">Exercise</div>
                <input class="text-input" id="exerciseInput" placeholder="Exercise name..." value="">
              </div>

              <div class="form-row">
                <div class="number-row" style="justify-content:space-around">
                  <div class="number-group">
                    <div class="number-label">Weight (lbs)</div>
                    <div class="stepper">
                      <button class="stepper-btn" onclick="stepValue('weightVal', -5)">-</button>
                      <div class="stepper-value" id="weightVal">135</div>
                      <button class="stepper-btn" onclick="stepValue('weightVal', 5)">+</button>
                    </div>
                  </div>
                  <div class="number-group">
                    <div class="number-label">Reps</div>
                    <div class="stepper">
                      <button class="stepper-btn" onclick="stepValue('repsVal', -1)">-</button>
                      <div class="stepper-value" id="repsVal">10</div>
                      <button class="stepper-btn" onclick="stepValue('repsVal', 1)">+</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-label">RPE (1-10) <span id="rpeDisplay" style="float:right;font-weight:700">7</span></div>
                <input type="range" min="1" max="10" value="7" id="rpeSlider" oninput="document.getElementById('rpeDisplay').textContent=this.value">
              </div>

              <div style="display:flex; gap:var(--space-md)">
                <button class="btn-secondary" style="flex:1" onclick="addStrengthSet()">Add Set</button>
                <button class="btn-primary" style="flex:1" onclick="toggleAddForm()">Done</button>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab-item tab-item-inactive" onclick="navigateTo('today.html')">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3,10 L12,3 L21,10 L21,20 C21,20.55 20.55,21 20,21 L15,21 L15,15 L9,15 L9,21 L4,21 C3.45,21 3,20.55 3,20 Z"/></svg></div>
          <div class="tab-label">Today</div>
        </div>
        <div class="tab-item tab-item-inactive" onclick="navigateTo('trends.html')">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="1" y="17" width="4" height="5" rx="0.5"/><rect x="7" y="13" width="4" height="9" rx="0.5"/><rect x="13" y="9" width="4" height="13" rx="0.5"/><rect x="19" y="4" width="4" height="18" rx="0.5"/><path d="M3,14 L9,10 L15,6 L21,2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17,2 21,2 21,6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="tab-label">Trends</div>
        </div>
        <div class="tab-item tab-center" onclick="navigateTo('log-entry.html')">
          <div class="tab-center-button">+</div>
        </div>
        <div class="tab-item tab-item-active">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,12 6,12 9,3 12,21 15,7 18,12 22,12"/></svg></div>
          <div class="tab-label">Activity</div>
        </div>
        <div class="tab-item tab-item-inactive" onclick="navigateTo('profile.html')">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5,20 C5,16.134 8.134,13 12,13 C15.866,13 19,16.134 19,20"/></svg></div>
          <div class="tab-label">Profile</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Session detail bottom sheet -->
  <div class="session-detail-overlay" id="sessionDetailOverlay" onclick="closeSessionDetail(event)">
    <div class="session-detail-sheet" onclick="event.stopPropagation()">
      <div style="width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto var(--space-lg)" onclick="dismissSessionDetail()"></div>
      <div id="sessionDetailContent"></div>
    </div>
  </div>

  <style>
    .session-detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      z-index: 100; align-items: flex-end; justify-content: center;
    }
    .session-detail-overlay.visible { display: flex; }
    .session-detail-sheet {
      width: 100%; max-width: 393px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: var(--space-xl);
      padding-bottom: calc(var(--space-xl) + env(safe-area-inset-bottom, 0px));
      max-height: 60vh; overflow-y: auto;
      animation: slideUp 0.25s ease; transition: transform 0.25s ease;
      touch-action: none;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="crypto-store.js"></script>
  <script src="data-loader.js"></script>
  <script src="js/activity.js"></script>
<script src="js/sw-register.js"></script>
</body>
</html>
