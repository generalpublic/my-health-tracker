<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Health Tracker — Activity</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    .page-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      padding: var(--space-sm) var(--space-xl) var(--space-md);
    }

    /* Session card */
    .session-card {
      padding: var(--space-xl);
    }

    .session-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-md);
    }

    .session-info {
      display: flex;
      gap: var(--space-md);
    }

    .session-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--primary-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .session-name {
      font-size: var(--text-lg);
      font-weight: 700;
    }

    .session-meta {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .session-cals {
      text-align: right;
    }

    .session-cal-num {
      font-size: var(--text-2xl);
      font-weight: 800;
      color: var(--primary);
    }

    .session-cal-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    /* Stats grid */
    .session-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      margin: var(--space-lg) 0;
    }

    .session-stat {
      text-align: center;
      padding: var(--space-md);
      background: var(--bg);
      border-radius: var(--radius-md);
    }

    .session-stat-value {
      font-size: var(--text-lg);
      font-weight: 700;
    }

    .session-stat-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* TE gauges */
    .te-row {
      display: flex;
      justify-content: space-around;
      margin: var(--space-lg) 0;
    }

    .te-item {
      text-align: center;
    }

    /* TE gauge uses .gauge .gauge-sm from design-system.css */
    .te-gauge {
      width: 70px;
      height: 70px;
    }

    .te-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Zone bar */
    .zone-section {
      margin-top: var(--space-md);
    }

    .zone-bar-lg {
      display: flex;
      height: 14px;
      border-radius: var(--radius-full);
      overflow: hidden;
      gap: 1px;
    }

    .zone-bar-lg > div {
      height: 100%;
    }

    .zone-legend {
      display: flex;
      justify-content: space-between;
      margin-top: var(--space-sm);
    }

    .zone-legend-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 10px;
      color: var(--text-secondary);
    }

    .zone-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      margin-bottom: 2px;
    }

    /* Manual entry section */
    .manual-section {
      margin-top: var(--space-lg);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border-subtle);
    }

    .manual-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }

    .manual-label {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .manual-pill {
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 600;
      background: var(--primary-bg);
      color: var(--primary);
    }

    /* Week history */
    .week-session {
      display: flex;
      align-items: center;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border-subtle);
      gap: var(--space-md);
    }

    .week-session:last-child {
      border-bottom: none;
    }

    .week-date {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      min-width: 48px;
    }

    .week-name {
      flex: 1;
      font-size: var(--text-base);
      font-weight: 500;
    }

    .week-dur {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .week-cal {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--primary);
      min-width: 50px;
      text-align: right;
    }

    /* Strength view */
    .strength-exercise {
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .strength-exercise:last-child {
      border-bottom: none;
    }

    .strength-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-xs);
    }

    .strength-name {
      font-size: var(--text-base);
      font-weight: 600;
    }

    .muscle-tag {
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      background: var(--primary-bg);
      color: var(--primary);
    }

    .strength-sets {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    /* Add exercise form */
    .add-form {
      display: none;
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border);
    }

    .add-form.visible {
      display: block;
    }

    .form-row {
      margin-bottom: var(--space-lg);
    }

    .form-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
    }

    .number-row {
      display: flex;
      gap: var(--space-lg);
    }

    .number-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
    }

    .number-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="screen">

      <div class="status-bar">
        <span>9:41</span>
        <span></span>
        <span>100%</span>
      </div>

      <div class="page-title">Activity</div>

      <!-- Segment control -->
      <div style="padding:0 var(--space-xl) var(--space-md)">
        <div class="segment-control">
          <div class="segment-item segment-item-active" id="segSessions" onclick="showView('sessions')">Sessions</div>
          <div class="segment-item" id="segStrength" onclick="showView('strength')">Strength</div>
        </div>
      </div>

      <div class="screen-content">

        <!-- ========== SESSIONS VIEW ========== -->
        <div id="sessionsView">

          <!-- Today's session -->
          <div class="card session-card animate-in" id="todaySession"></div>

          <!-- This week -->
          <div class="card animate-in" style="margin-top:var(--space-md)">
            <div class="card-title" style="margin-bottom:var(--space-md)">This Week</div>
            <div id="weekSessions"></div>
          </div>
        </div>

        <!-- ========== STRENGTH VIEW ========== -->
        <div id="strengthView" style="display:none">

          <div class="card animate-in">
            <div class="card-header">
              <div class="card-title">Today's Exercises</div>
              <span class="badge" id="setCount"></span>
            </div>
            <div id="strengthList"></div>
          </div>

          <!-- Add exercise -->
          <div class="card animate-in" style="margin-top:var(--space-md)">
            <button class="btn-secondary" onclick="toggleAddForm()" id="addBtn">+ Add Exercise</button>

            <div class="add-form" id="addForm">
              <div class="form-row">
                <div class="form-label">Muscle Group</div>
                <div class="pill-row">
                  <div class="pill pill-active">Chest</div>
                  <div class="pill">Back</div>
                  <div class="pill">Shoulders</div>
                  <div class="pill">Arms</div>
                  <div class="pill">Legs</div>
                  <div class="pill">Core</div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-label">Exercise</div>
                <input class="text-input" placeholder="Exercise name..." value="">
              </div>

              <div class="form-row">
                <div class="number-row" style="justify-content:space-around">
                  <div class="number-group">
                    <div class="number-label">Weight (lbs)</div>
                    <div class="stepper">
                      <button class="stepper-btn">-</button>
                      <div class="stepper-value">135</div>
                      <button class="stepper-btn">+</button>
                    </div>
                  </div>
                  <div class="number-group">
                    <div class="number-label">Reps</div>
                    <div class="stepper">
                      <button class="stepper-btn">-</button>
                      <div class="stepper-value">10</div>
                      <button class="stepper-btn">+</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-label">RPE (1-10)</div>
                <input type="range" min="1" max="10" value="7">
              </div>

              <div style="display:flex; gap:var(--space-md)">
                <button class="btn-secondary" style="flex:1">Add Set</button>
                <button class="btn-primary" style="flex:1" onclick="toggleAddForm()">Done</button>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab-item tab-item-inactive" onclick="navigateTo('today.html')">
          <div class="tab-icon">&#8962;</div>
          <div class="tab-label">Today</div>
        </div>
        <div class="tab-item tab-item-inactive" onclick="navigateTo('trends.html')">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22,4 16,10 12,6 2,16"/></svg></div>
          <div class="tab-label">Trends</div>
        </div>
        <div class="tab-item tab-center" onclick="navigateTo('log-entry.html')">
          <div class="tab-center-button">+</div>
        </div>
        <div class="tab-item tab-item-active">
          <div class="tab-icon">&#9883;</div>
          <div class="tab-label">Activity</div>
        </div>
        <div class="tab-item tab-item-inactive" onclick="navigateTo('profile.html')">
          <div class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5,20 C5,16.134 8.134,13 12,13 C15.866,13 19,16.134 19,20"/></svg></div>
          <div class="tab-label">Profile</div>
        </div>
      </div>

    </div>
  </div>

  <script src="sample-data.js"></script>
  <script>
    function navigateTo(page) { window.location.href = page; }

    const D = SAMPLE_DATA.today;

    // ============================================
    // View switching
    // ============================================

    function showView(view) {
      document.getElementById('sessionsView').style.display = view === 'sessions' ? 'block' : 'none';
      document.getElementById('strengthView').style.display = view === 'strength' ? 'block' : 'none';
      document.getElementById('segSessions').className = 'segment-item' + (view === 'sessions' ? ' segment-item-active' : '');
      document.getElementById('segStrength').className = 'segment-item' + (view === 'strength' ? ' segment-item-active' : '');
    }

    // ============================================
    // Today's session
    // ============================================

    (function renderTodaySession() {
      const s = D.sessions[0];
      if (!s) {
        document.getElementById('todaySession').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:var(--space-xl);">No sessions today yet</div>';
        return;
      }

      const icons = { running: '&#127939;', cycling: '&#128690;', swimming: '&#127946;', strength: '&#127947;', walking: '&#128694;' };
      const totalZone = s.zone_1_min + s.zone_2_min + s.zone_3_min + s.zone_4_min + s.zone_5_min;

      // TE gauge helper
      function teGauge(val, label) {
        const r = 26, sw = 6, w = 70;
        const circ = 2 * Math.PI * r;
        const pct = val / 5;
        const offset = circ * (1 - pct);
        const color = getStatusColor(val, 'aerobic_te');
        const gId = 'teGrad' + label.replace(/\s/g, '');
        return `
          <div class="te-item">
            <div class="gauge te-gauge">
              <svg width="${w}" height="${w}" viewBox="0 0 ${w} ${w}">
                <defs>
                  <linearGradient id="${gId}" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#8B5CF6" />
                    <stop offset="100%" stop-color="#06B6D4" />
                  </linearGradient>
                </defs>
                <circle cx="${w/2}" cy="${w/2}" r="${r}" class="gauge-track" stroke-width="${sw}" />
                <circle cx="${w/2}" cy="${w/2}" r="${r}" class="gauge-fill"
                  stroke="url(#${gId})" stroke-width="${sw}"
                  stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
                  stroke-linecap="round" />
              </svg>
              <div class="gauge-value">
                <div class="gauge-number" style="font-size:var(--text-lg);color:${color}">${val}</div>
              </div>
            </div>
            <div class="te-label">${label}</div>
          </div>`;
      }

      document.getElementById('todaySession').innerHTML = `
        <div class="session-top">
          <div class="session-info">
            <div class="session-icon">${icons[s.activity_type] || '&#9883;'}</div>
            <div>
              <div class="session-name">${s.activity_name}</div>
              <div class="session-meta">${s.duration_min} min &bull; ${s.distance_mi} mi</div>
            </div>
          </div>
          <div class="session-cals">
            <div class="session-cal-num">${s.calories}</div>
            <div class="session-cal-label">calories</div>
          </div>
        </div>

        <div class="session-stats">
          <div class="session-stat">
            <div class="session-stat-value">${s.avg_hr}</div>
            <div class="session-stat-label">Avg HR</div>
          </div>
          <div class="session-stat">
            <div class="session-stat-value">${s.max_hr}</div>
            <div class="session-stat-label">Max HR</div>
          </div>
          <div class="session-stat">
            <div class="session-stat-value">${s.distance_mi} mi</div>
            <div class="session-stat-label">Distance</div>
          </div>
        </div>

        <div class="te-row">
          ${teGauge(s.aerobic_te, 'Aerobic TE')}
          ${teGauge(s.anaerobic_te, 'Anaerobic TE')}
        </div>

        <div class="zone-section">
          <div style="font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-sm)">HR Zones</div>
          <div class="zone-bar-lg">
            <div style="width:${(s.zone_1_min/totalZone*100)}%;background:var(--zone-1)"></div>
            <div style="width:${(s.zone_2_min/totalZone*100)}%;background:var(--zone-2)"></div>
            <div style="width:${(s.zone_3_min/totalZone*100)}%;background:var(--zone-3)"></div>
            <div style="width:${(s.zone_4_min/totalZone*100)}%;background:var(--zone-4)"></div>
            <div style="width:${(s.zone_5_min/totalZone*100)}%;background:var(--zone-5)"></div>
          </div>
          <div class="zone-legend">
            <div class="zone-legend-item"><div class="zone-legend-dot" style="background:var(--zone-1)"></div>Z1 ${s.zone_1_min}m</div>
            <div class="zone-legend-item"><div class="zone-legend-dot" style="background:var(--zone-2)"></div>Z2 ${s.zone_2_min}m</div>
            <div class="zone-legend-item"><div class="zone-legend-dot" style="background:var(--zone-3)"></div>Z3 ${s.zone_3_min}m</div>
            <div class="zone-legend-item"><div class="zone-legend-dot" style="background:var(--zone-4)"></div>Z4 ${s.zone_4_min}m</div>
            <div class="zone-legend-item"><div class="zone-legend-dot" style="background:var(--zone-5)"></div>Z5 ${s.zone_5_min}m</div>
          </div>
        </div>

        <div class="manual-section">
          <div class="manual-row">
            <span class="manual-label">Perceived Effort</span>
            <span class="manual-pill">${s.perceived_effort}/10</span>
          </div>
          <div class="manual-row">
            <span class="manual-label">Post-Workout Energy</span>
            <span class="manual-pill">${s.post_workout_energy}/10</span>
          </div>
          ${s.notes ? `<div style="font-size:var(--text-sm);color:var(--text-secondary);margin-top:var(--space-sm);">"${s.notes}"</div>` : ''}
        </div>`;
    })();

    // ============================================
    // This week's sessions
    // ============================================

    (function renderWeekSessions() {
      const sessions = SAMPLE_DATA.sessions_history;
      document.getElementById('weekSessions').innerHTML = sessions.map(s => {
        const date = new Date(s.date + 'T12:00:00');
        const dayStr = date.toLocaleDateString('en-US', { weekday: 'short' });
        return `
          <div class="week-session">
            <div class="week-date">${dayStr}</div>
            <div class="week-name">${s.activity_name}</div>
            <div class="week-dur">${s.duration}m</div>
            <div class="week-cal">${s.calories} cal</div>
          </div>`;
      }).join('');
    })();

    // ============================================
    // Strength view
    // ============================================

    (function renderStrength() {
      const exercises = D.strength;
      document.getElementById('setCount').textContent = exercises.length + ' sets';

      // Group by exercise
      const grouped = {};
      exercises.forEach(e => {
        const key = e.exercise;
        if (!grouped[key]) grouped[key] = { ...e, sets: [] };
        grouped[key].sets.push(e);
      });

      document.getElementById('strengthList').innerHTML = Object.values(grouped).map(g => `
        <div class="strength-exercise">
          <div class="strength-header">
            <div class="strength-name">${g.exercise}</div>
            <span class="muscle-tag">${g.muscle_group}</span>
          </div>
          <div class="strength-sets">
            ${g.sets.map((s, i) => `Set ${i+1}: ${s.weight} lbs x ${s.reps} @ RPE ${s.rpe}`).join('<br>')}
          </div>
        </div>
      `).join('');
    })();

    // ============================================
    // Add exercise form toggle
    // ============================================

    function toggleAddForm() {
      const form = document.getElementById('addForm');
      const btn = document.getElementById('addBtn');
      form.classList.toggle('visible');
      btn.style.display = form.classList.contains('visible') ? 'none' : 'block';
    }
  </script>
</body>
</html>
