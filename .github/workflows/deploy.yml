name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject config from secrets
        run: |
          cat > app_mockups/config.js << CONFIGEOF
          const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          const SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          const USER_NAME = '${{ secrets.USER_NAME }}';
          const EDGE_FUNCTION_URL = '${{ secrets.EDGE_FUNCTION_URL }}';
          const APP_VERSION = '1.0';
          const SCHEMA_VERSION = '3.2';
          CONFIGEOF
      - name: Remove debug page from deploy
        run: rm -f app_mockups/debug.html
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run schema and migration tests
        run: |
          pip install pytest python-dotenv -q
          python -m pytest tests/ --ignore=tests/test_pure_functions.py -v --tb=short
      - name: Pre-deploy verification
        run: |
          echo "=== CSP check ==="
          MISSING_CSP=""
          for f in app_mockups/index.html app_mockups/today.html app_mockups/activity.html \
                   app_mockups/calendar.html app_mockups/trends.html app_mockups/sleep-detail.html \
                   app_mockups/log-entry.html app_mockups/profile.html; do
            if ! grep -q "Content-Security-Policy" "$f"; then
              MISSING_CSP="$MISSING_CSP $f"
            fi
          done
          if [ -n "$MISSING_CSP" ]; then
            echo "FAIL: Missing CSP in:$MISSING_CSP"
            exit 1
          fi
          echo "All pages have CSP"

          echo "=== Inline script check ==="
          INLINE_FOUND=""
          for f in app_mockups/index.html app_mockups/today.html app_mockups/activity.html \
                   app_mockups/calendar.html app_mockups/trends.html app_mockups/sleep-detail.html \
                   app_mockups/log-entry.html app_mockups/profile.html; do
            # Count <script> tags without src= that have body content
            if grep -P '<script>(?![\s]*$)' "$f" > /dev/null 2>&1; then
              INLINE_FOUND="$INLINE_FOUND $f"
            fi
          done
          if [ -n "$INLINE_FOUND" ]; then
            echo "FAIL: Inline scripts in:$INLINE_FOUND"
            exit 1
          fi
          echo "No inline scripts in deployed pages"

          echo "=== Secrets scan ==="
          JWT_PAT="eyJ"
          if grep -rn "$JWT_PAT" app_mockups/config.js 2>/dev/null; then
            echo "FAIL: Possible JWT/key in config.js"
            exit 1
          fi
          GH_PAT="gh""p_\|gh""o_\|github_""pat_"
          if grep -rn "$GH_PAT" app_mockups/ 2>/dev/null; then
            echo "FAIL: GitHub token found in source"
            exit 1
          fi
          echo "No secrets detected"

          echo "=== All pre-deploy checks passed ==="
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'app_mockups'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
